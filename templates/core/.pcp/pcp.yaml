schema_version: 1
protocol:
  name: persistent-context-protocol
  version: 0.1.0
persistence: tracked
capabilities: []
continuity:
  active_event_limit: 64
  archive_batch_size: 32
  archive_read_policy: explicit-only
ownership:
  protocol:
    - .gitignore
    - 00-index.md
    - pcp.yaml
    - protocol/**
    - continuity/00-index.md
    - continuity/actors/00-index.md
    - continuity/archive/00-index.md
    - continuity/checkpoints/00-index.md
    - continuity/events/00-index.md
    - state/00-index.md
    - views/00-index.md
    - schemas/**
    - tools/**
  project:
    - knowledge/**
    - operations/**
    - projects/**
    - continuity/actors/*.yaml
    - continuity/archive/*.yaml
    - continuity/events/*.yaml
    - state/*.yaml
    - references/**
    - templates/**
  generated:
    - views/*.generated.md
  runtime:
    - continuity/checkpoints/*.yaml
    - runtime/**
adapter_ids: []
validation:
  strict: true
  schema_root: schemas
  generated_views_read_only: true
vcs_policy_path: state/vcs-policy.yaml
