name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify

  test:
    name: test
    needs: verify
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require every verification job
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
        run: test "$VERIFY_RESULT" = "success"
